<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PlanMyRoute — Stage 2 Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #0A0A0C;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Schibsted Grotesk', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .phone {
    width: 390px;
    height: 844px;
    border-radius: 54px;
    overflow: hidden;
    background: #F4F2F7;
    position: relative;
    flex-shrink: 0;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.08),
      0 40px 120px rgba(0,0,0,.72),
      inset 0 0 0 1px rgba(255,255,255,.05);
  }
  #root { width: 100%; height: 100%; }
  button { -webkit-tap-highlight-color: transparent; }

  /* Scale down for shorter viewports */
  @media (max-height: 900px) {
    .phone {
      height: calc(100vh - 40px);
      width: calc((100vh - 40px) * 390 / 844);
      border-radius: calc((100vh - 40px) * 54 / 844);
    }
  }
  /* Full-bleed on actual mobile */
  @media (max-width: 430px) {
    body { align-items: flex-start; }
    .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
  }

  /* Screen label for prototype nav hint */
  .hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; color: rgba(255,255,255,.28); white-space: nowrap;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="phone">
  <div id="root"></div>
</div>
<div class="hint">Tap a trip card → detail &nbsp;·&nbsp; + button → AI wizard</div>

<script src="ds-tokens.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="TripsScreen.jsx"></script>
<script type="text/babel" src="TripDetailScreen.jsx"></script>
<script type="text/babel" src="AIWizardScreen.jsx"></script>

<script type="text/babel">
const { useState } = React;
const C = DS.color, F = DS.font;

const Toast = ({ msg }) => msg ? (
  <div style={{ position:'absolute', bottom:88, left:'50%', transform:'translateX(-50%)', background:C.ink, color:'#fff', padding:'10px 18px', borderRadius:DS.radius.pill, fontFamily:F.body, fontSize:13, fontWeight:600, whiteSpace:'nowrap', zIndex:200, boxShadow:DS.shadow.float, pointerEvents:'none', animation:'toastIn .2s ease' }}>
    {msg}
  </div>
) : null;

const App = () => {
  const [screen, setScreen] = useState('dashboard');
  const [trip,   setTrip]   = useState(null);
  const [toast,  setToast]  = useState(null);

  // Debug nav hook (harmless in production)
  React.useEffect(() => {
    window._nav = (s, t) => { if (t) setTrip(t); setScreen(s); };
    return () => { delete window._nav; };
  }, []);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2600); };

  const goTo = (s, data) => { if (data) setTrip(data); setScreen(s); };

  return (
    <div style={{ position:'relative', width:'100%', height:'100%', overflow:'hidden', background:C.bg }}>
      <style>{`
        @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
      `}</style>

      {/* Dashboard — always base layer, scales back when covered */}
      <div style={{
        position:'absolute', inset:0,
        transform: screen==='dashboard' ? 'none' : 'translateX(-5%) scale(.97)',
        opacity:   screen==='dashboard' ? 1 : .6,
        transition: 'transform .32s cubic-bezier(.4,0,.2,1), opacity .32s',
        pointerEvents: screen==='dashboard' ? 'auto' : 'none',
      }}>
        <TripsScreen
          onTrip={t  => goTo('detail', t)}
          onWizard={() => goTo('wizard')}
          onToast={showToast}
        />
      </div>

      {/* Trip detail — slides in from right */}
      <div style={{
        position:'absolute', inset:0,
        transform: screen==='detail' ? 'none' : 'translateX(100%)',
        transition: 'transform .32s cubic-bezier(.4,0,.2,1)',
        pointerEvents: screen==='detail' ? 'auto' : 'none',
        background: C.bg,
      }}>
        <TripDetailScreen trip={trip} onBack={() => setScreen('dashboard')} />
      </div>

      {/* AI Wizard — slides up as a sheet */}
      <div style={{
        position:'absolute', inset:0,
        transform: screen==='wizard' ? 'none' : 'translateY(100%)',
        transition: 'transform .36s cubic-bezier(.32,0,.18,1)',
        pointerEvents: screen==='wizard' ? 'auto' : 'none',
        background: C.surface,
      }}>
        <AIWizardScreen onClose={() => setScreen('dashboard')} />
      </div>

      <Toast msg={toast} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
