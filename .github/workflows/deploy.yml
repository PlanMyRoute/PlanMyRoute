name: Deploy PlanMyRoute

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.105.153.20
          username: adrian
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 20m
          script: |
            cd /opt/proyecto/planmyroute
            git pull origin main
            docker compose down
            docker compose build --no-cache
            docker compose up -d
