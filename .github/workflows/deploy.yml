name: Deploy PlanMyRoute

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend via Docker
        uses: appleboy/ssh-action@v1.0.3
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          host: 178.105.153.20
          username: adrian
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 20m
          envs: SUPABASE_SERVICE_ROLE_KEY
          script: |
            export DOCKER_HOST=unix:///var/run/docker.sock
            cd /opt/proyecto/planmyroute
            git pull origin main
            sed -i "s|^SUPABASE_SERVICE_ROLE_KEY=.*|SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}|" apps/backend/.env
            grep -q "^ALLOWED_ORIGINS=" apps/backend/.env \
              && sed -i "s|^ALLOWED_ORIGINS=.*|ALLOWED_ORIGINS=https://planmyroute.es,https://www.planmyroute.es|" apps/backend/.env \
              || echo "ALLOWED_ORIGINS=https://planmyroute.es,https://www.planmyroute.es" >> apps/backend/.env
            docker compose down || true
            docker compose build --no-cache
            docker compose up -d

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend web
        working-directory: apps/frontend
        env:
          EXPO_PUBLIC_API_URL: 'https://planmyroute.es/api'
        run: npx expo export -p web

      - name: Copy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.105.153.20
          username: adrian
          password: ${{ secrets.SSH_PASSWORD }}
          source: "apps/frontend/dist/*"
          target: "/opt/proyecto/planmyroute/apps/frontend/dist"
          strip_components: 3
